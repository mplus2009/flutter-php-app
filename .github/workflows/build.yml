name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        # Crear proyecto
        cd /tmp
        flutter create --org com.mplus2009 fresh_app
        cd fresh_app
        
        # Reemplazar main.dart
        cp $GITHUB_WORKSPACE/lib/main.dart lib/main.dart
        
        # Modificar AndroidManifest.xml de forma simple
        # Agregar usesCleartextTraffic y quitar FlutterApplication
        sed -i 's/io.flutter.app.FlutterApplication/android.app.Application/' android/app/src/main/AndroidManifest.xml
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
        
        # Agregar permiso de Internet si no existe
        if ! grep -q "INTERNET" android/app/src/main/AndroidManifest.xml; then
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' android/app/src/main/AndroidManifest.xml
        fi
        
        # Compilar
        flutter clean
        flutter pub get
        flutter build apk --release
        
        # Copiar APK
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/app-release.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flutter-php-app
        path: app-release.apk
