name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
    
    - name: Create Flutter project and build
      run: |
        # Crear proyecto
        cd /tmp
        flutter create --org com.mplus2009 --project-name flutter_php_app fresh_app
        
        # Copiar nuestro main.dart
        cp $GITHUB_WORKSPACE/lib/main.dart /tmp/fresh_app/lib/main.dart
        
        # Crear AndroidManifest.xml COMPLETO con flutterEmbedding
        cat > /tmp/fresh_app/android/app/src/main/AndroidManifest.xml << 'EOM'
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            
            <application
                android:label="Flutter PHP"
                android:name="io.flutter.app.FlutterApplication"
                android:usesCleartextTraffic="true">
                
                <activity
                    android:name=".MainActivity"
                    android:exported="true"
                    android:launchMode="singleTop"
                    android:theme="@style/LaunchTheme"
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                    android:hardwareAccelerated="true"
                    android:windowSoftInputMode="adjustResize">
                    
                    <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme"/>
                    
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
                
                <meta-data
                    android:name="flutterEmbedding"
                    android:value="2"/>
            </application>
        </manifest>
        EOM
        
        # Compilar
        cd /tmp/fresh_app
        flutter clean
        flutter pub get
        flutter build apk --release
        
        # Copiar APK
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/app-release.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: flutter-php-app
        path: app-release.apk
